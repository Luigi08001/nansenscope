<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NansenScope — Scan Results</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060B14;--surface:#0C1420;--card:#111C2E;--border:#1A2940;--accent:#00E5A0;--txt:#E8ECF2;--muted:#8895A7;--crit:#E5484D;--high:#F5A623;--med:#6B7280}
body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.header h1 span{color:var(--accent)}
.meta{font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
.meta b{color:var(--txt)}
.back{font-size:12px;color:var(--muted);border:1px solid var(--border);padding:4px 12px;border-radius:4px}
.back:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}
/* Refresh indicator */
.refresh{font-size:10px;color:var(--muted);opacity:0.5}
/* Empty state */
.empty{text-align:center;padding:80px 20px}
.empty h2{font-size:20px;margin-bottom:12px;color:var(--muted)}
.empty code{background:var(--card);padding:4px 10px;border-radius:4px;font-size:13px;color:var(--accent)}
.empty .hint{margin-top:16px;font-size:11px;color:var(--med)}
/* Top signals cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card .token{font-size:16px;font-weight:700;margin-bottom:4px}
.card .chain{font-size:11px;color:var(--muted)}
.card .score{font-size:24px;font-weight:700;color:var(--accent);margin:8px 0 4px}
.card .summary{font-size:11px;color:var(--muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
/* Severity badges */
.sev{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.04em}
.sev-critical{background:rgba(229,72,77,.15);color:var(--crit);border:1px solid rgba(229,72,77,.3)}
.sev-high{background:rgba(245,166,35,.15);color:var(--high);border:1px solid rgba(245,166,35,.3)}
.sev-medium{background:rgba(107,114,128,.15);color:var(--med);border:1px solid rgba(107,114,128,.3)}
.sev-low{background:rgba(107,114,128,.1);color:#555;border:1px solid rgba(107,114,128,.2)}
/* Chain heatmap */
.heatmap{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.tile{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;min-width:100px;flex:1;transition:border-color .2s,transform .2s}
.tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.tile .name{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:capitalize}
.tile .count{font-size:28px;font-weight:700;line-height:1}
.tile .top{font-size:10px;color:var(--muted);margin-top:4px}
/* Table */
.tbl-wrap{overflow-x:auto;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--accent)}
th .arrow{font-size:10px;margin-left:4px;opacity:.4}
th.active .arrow{opacity:1;color:var(--accent)}
td{padding:8px 10px;border-bottom:1px solid rgba(26,41,64,.4);white-space:nowrap}
tr:hover td{background:rgba(0,229,160,.03)}
.token-name{font-weight:600}
.score-cell{font-weight:700;color:var(--accent)}
/* Section titles */
.section-title{font-size:13px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Nansen<span>Scope</span> Results</h1>
      <div class="meta" id="meta"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="refresh" id="refresh"></span>
      <a href="index.html" class="back">&larr; Landing Page</a>
    </div>
  </div>
  <div id="content">
    <div class="empty" id="empty" style="display:none">
      <h2>No scan data yet</h2>
      <p>Run a scan first:</p>
      <p style="margin-top:10px"><code>python nansenscope.py scan --chains ethereum,base,solana</code></p>
      <p class="hint" id="hint"></p>
    </div>
    <div id="results" style="display:none">
      <p class="section-title">Top Signals</p>
      <div class="cards" id="cards"></div>
      <p class="section-title">Chain Heatmap</p>
      <div class="heatmap" id="heatmap"></div>
      <p class="section-title">All Signals</p>
      <div class="tbl-wrap">
        <table>
          <thead><tr id="thead"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const dataUrl = params.get('data') || '../reports/latest_results.json';
  let sortCol = 'score', sortDir = -1;

  function sevClass(s){ return 'sev sev-'+(s||'low').toLowerCase(); }
  function sevLabel(s){ return (s||'LOW').toUpperCase(); }
  function fmtTime(iso){
    try{ const d=new Date(iso); return d.toLocaleString()+' UTC'; }catch(e){ return iso; }
  }
  function intensity(count, max){ return Math.max(0.15, Math.min(1, count/(max||1))); }

  function render(data){
    document.getElementById('empty').style.display='none';
    document.getElementById('results').style.display='block';
    // Meta
    document.getElementById('meta').innerHTML =
      '<span>Last Scan: <b>'+fmtTime(data.timestamp)+'</b></span>'+
      '<span><b>'+data.chains.length+'</b> chains</span>'+
      '<span><b>'+data.total_signals+'</b> signals</span>';
    // Top 5 cards
    const top5 = (data.signals||[]).slice(0,5);
    document.getElementById('cards').innerHTML = top5.map(s =>
      '<div class="card">'+
        '<div class="token">'+esc(s.token)+'</div>'+
        '<div class="chain">'+esc(s.chain)+' &middot; <span class="'+sevClass(s.severity)+'">'+sevLabel(s.severity)+'</span></div>'+
        '<div class="score">'+Math.round(s.score)+'</div>'+
        '<div class="summary">'+esc(s.summary)+'</div>'+
      '</div>'
    ).join('');
    // Chain heatmap
    const cs = data.chain_summary||{};
    const maxCount = Math.max(...Object.values(cs).map(c=>c.signal_count||0), 1);
    document.getElementById('heatmap').innerHTML = Object.keys(cs).map(chain=>{
      const c=cs[chain], a=intensity(c.signal_count, maxCount);
      return '<div class="tile" style="border-color:rgba(0,229,160,'+a+')">'+
        '<div class="name">'+esc(chain)+'</div>'+
        '<div class="count" style="color:rgba(0,229,160,'+Math.max(a,0.5)+')">'+c.signal_count+'</div>'+
        '<div class="top">'+(c.top_token?'Top: '+esc(c.top_token):'—')+'</div></div>';
    }).join('');
    // Table
    renderTable(data.signals||[]);
  }

  function renderTable(signals){
    const cols=[
      {key:'score',label:'Score',w:'70px'},
      {key:'severity',label:'Sev',w:'80px'},
      {key:'chain',label:'Chain',w:'100px'},
      {key:'token',label:'Token',w:'100px'},
      {key:'type',label:'Type',w:'140px'},
      {key:'summary',label:'Signal',w:''}
    ];
    const sevOrder={critical:0,high:1,medium:2,low:3};
    const sorted=[...signals].sort((a,b)=>{
      let va=a[sortCol],vb=b[sortCol];
      if(sortCol==='severity'){va=sevOrder[(va||'').toLowerCase()]||3;vb=sevOrder[(vb||'').toLowerCase()]||3;}
      if(typeof va==='number'&&typeof vb==='number') return (va-vb)*sortDir;
      return String(va||'').localeCompare(String(vb||''))*sortDir;
    });
    document.getElementById('thead').innerHTML=cols.map(c=>
      '<th class="'+(sortCol===c.key?'active':'')+'" data-col="'+c.key+'" '+(c.w?'style="width:'+c.w+'"':'')+'>'+
      c.label+'<span class="arrow">'+(sortCol===c.key?(sortDir>0?'&#9650;':'&#9660;'):'&#9660;')+'</span></th>'
    ).join('');
    document.getElementById('tbody').innerHTML=sorted.map(s=>
      '<tr>'+
        '<td class="score-cell">'+Math.round(s.score)+'</td>'+
        '<td><span class="'+sevClass(s.severity)+'">'+sevLabel(s.severity)+'</span></td>'+
        '<td>'+esc(s.chain)+'</td>'+
        '<td class="token-name">'+esc(s.token)+'</td>'+
        '<td>'+esc(s.type)+'</td>'+
        '<td style="white-space:normal;max-width:350px">'+esc(s.summary)+'</td>'+
      '</tr>'
    ).join('');
    document.querySelectorAll('#thead th').forEach(th=>{
      th.onclick=function(){
        const col=this.dataset.col;
        if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=-1; }
        renderTable(signals);
      };
    });
  }

  function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

  function showEmpty(extra){
    document.getElementById('empty').style.display='block';
    document.getElementById('results').style.display='none';
    if(extra) document.getElementById('hint').textContent=extra;
  }

  function load(){
    fetch(dataUrl).then(r=>{
      if(!r.ok) throw new Error(r.status);
      return r.json();
    }).then(data=>{
      if(!data||!data.signals) return showEmpty();
      render(data);
      document.getElementById('refresh').textContent='Auto-refresh: 30s';
    }).catch(e=>{
      if(location.protocol==='file:'){
        showEmpty('file:// protocol blocks fetch. Serve with: python -m http.server 8000 --directory .');
      } else {
        showEmpty('Could not load '+dataUrl+': '+e.message);
      }
    });
  }

  load();
  setInterval(load, 30000);
})();
</script>
</body>
</html>
