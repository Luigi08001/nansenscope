<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NansenScope — Syndicate Hunter Network Map</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060B14; color: #E8ECF2; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
  #header { position: fixed; top: 0; left: 0; right: 0; padding: 16px 24px; z-index: 10; display: flex; justify-content: space-between; align-items: center; background: rgba(6,11,20,0.85); backdrop-filter: blur(8px); border-bottom: 1px solid #1A2940; }
  #header h1 { font-size: 16px; color: #00E5A0; font-weight: 600; }
  #header .meta { font-size: 11px; color: #8895A7; }
  #controls { display: flex; gap: 8px; }
  #controls button { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.25); color: #00E5A0; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.2s; }
  #controls button:hover { background: rgba(0,229,160,0.2); }
  #network-map-container { position: fixed; inset: 0; top: 52px; cursor: grab; }
  canvas { display: block; width: 100%; height: 100%; }
  #net-tooltip { position: absolute; pointer-events: none; background: rgba(6,11,20,0.92); border: 1px solid #1A2940; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #E8ECF2; display: none; z-index: 20; max-width: 250px; line-height: 1.5; backdrop-filter: blur(8px); }
  #legend { position: fixed; bottom: 20px; left: 20px; background: rgba(6,11,20,0.85); border: 1px solid #1A2940; border-radius: 8px; padding: 12px 16px; font-size: 10px; z-index: 10; backdrop-filter: blur(8px); }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>Syndicate Hunter — ETH Smart Money Network</h1>
    <div class="meta">Drag nodes · Scroll to zoom · Pan with click+drag</div>
  </div>
  <div id="controls">
    <button onclick="netZoom(1.3)">Zoom +</button>
    <button onclick="netZoom(0.7)">Zoom −</button>
    <button onclick="netReset()">Reset</button>
  </div>
</div>
<div id="network-map-container">
  <canvas id="network-canvas"></canvas>
  <div id="net-tooltip"></div>
</div>
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00E5A0"></div> Hub / Smart Money</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F5A623"></div> Fund Deployer</div>
  <div class="legend-item"><div class="legend-sq" style="background:#A855F7"></div> Exchange / DEX</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4B5563"></div> Related Wallet</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2A3040"></div> Peripheral</div>
</div>
<script>
// Same canvas network renderer as the landing page
(function(){
  const canvas = document.getElementById('network-canvas');
  const container = document.getElementById('network-map-container');
  const tt = document.getElementById('net-tooltip');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let W = window.innerWidth, H = window.innerHeight - 52;
  let initialized = false;
  function resize(){
    W = window.innerWidth; H = window.innerHeight - 52;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function rAddr(){ return '0x'+Array.from({length:4},()=>Math.floor(Math.random()*65536).toString(16).padStart(4,'0')).join('').slice(0,4)+'...'+Math.floor(Math.random()*65536).toString(16).padStart(4,'0'); }
  const nodes = [], edges = [];
  const CX = W/2, CY = H/2;
  const hub1X = CX - 160, hub1Y = CY;
  const hub2X = CX + 160, hub2Y = CY;
  nodes.push({id:0, x:hub1X, y:hub1Y, vx:0, vy:0, r:22, label:'DeFi Whale #1', color:'#00E5A0', type:'hub', cluster:1, detail:'Accumulated $2.1M across 47 tokens'});
  nodes.push({id:1, x:hub2X, y:hub2Y, vx:0, vy:0, r:18, label:'Fund Deployer', color:'#F5A623', type:'hub', cluster:0, detail:'Deployed $450K to 4 wallets'});
  const smLabels = [
    {name:'DEX Buyer', detail:'$340K profit', cl:1},{name:'Yield Farmer', detail:'$1.2M deposited', cl:1},
    {name:'NFT Flipper', detail:'$890K PnL', cl:1},{name:'MEV Searcher', detail:'$45K/week', cl:1},
    {name:'DAO Treasury', detail:'8 DAOs', cl:0},{name:'Accumulator', detail:'18mo DCA', cl:0}
  ];
  const smR = 110;
  const sm1 = smLabels.filter(s=>s.cl===1), sm0 = smLabels.filter(s=>s.cl===0);
  sm1.forEach((s,i)=>{
    const angle = (i/sm1.length)*Math.PI*2 - Math.PI/2;
    nodes.push({id:nodes.length, x:hub1X+Math.cos(angle)*smR, y:hub1Y+Math.sin(angle)*smR, vx:0,vy:0, r:9, label:s.name, color:'#00E5A0', type:'sm', cluster:1, detail:s.detail});
    edges.push({s:0, t:nodes.length-1, type:'hub-sm'});
  });
  sm0.forEach((s,i)=>{
    const angle = (i/sm0.length)*Math.PI*2 - Math.PI/2;
    nodes.push({id:nodes.length, x:hub2X+Math.cos(angle)*smR, y:hub2Y+Math.sin(angle)*smR, vx:0,vy:0, r:9, label:s.name, color:'#00E5A0', type:'sm', cluster:0, detail:s.detail});
    edges.push({s:1, t:nodes.length-1, type:'hub-sm'});
  });
  const knownLabels=['LP Provider','Staker','Bridge User','Holder','Hunter','Multi-Sig','Funder','Bot Wallet','OTC Desk','Mixer','Cold Storage','Hot Wallet','DAO Voter','Claimer','Liquidator','Flash Loan','Relayer','Gas Funder','Deployer','Admin Key'];
  const knownR1 = 200, knownR0 = 190;
  knownLabels.slice(0,12).forEach((lbl,i)=>{
    const angle = (i/12)*Math.PI*2 - Math.PI/4;
    nodes.push({id:nodes.length, x:hub1X+Math.cos(angle)*knownR1, y:hub1Y+Math.sin(angle)*knownR1, vx:0,vy:0, r:5, label:lbl, color:'#4B5563', type:'known', cluster:1, detail:'Linked via on-chain transfers'});
    edges.push({s:0, t:nodes.length-1, type:'hub-known'});
    if(Math.random()<0.4){const sp=nodes.filter(n=>n.type==='sm'&&n.cluster===1);if(sp.length)edges.push({s:sp[Math.floor(Math.random()*sp.length)].id, t:nodes.length-1, type:'hub-known'});}
  });
  knownLabels.slice(12).forEach((lbl,i)=>{
    const angle = (i/8)*Math.PI*2 + Math.PI/4;
    nodes.push({id:nodes.length, x:hub2X+Math.cos(angle)*knownR0, y:hub2Y+Math.sin(angle)*knownR0, vx:0,vy:0, r:5, label:lbl, color:'#4B5563', type:'known', cluster:0, detail:'Linked via on-chain transfers'});
    edges.push({s:1, t:nodes.length-1, type:'hub-known'});
    if(Math.random()<0.4){const sp=nodes.filter(n=>n.type==='sm'&&n.cluster===0);if(sp.length)edges.push({s:sp[Math.floor(Math.random()*sp.length)].id, t:nodes.length-1, type:'hub-known'});}
  });
  const entityData = [{label:'Binance',angle:-Math.PI/2,dist:280},{label:'Coinbase',angle:Math.PI*0.15,dist:290},{label:'Uniswap V3',angle:Math.PI*0.65,dist:275},{label:'Aave',angle:Math.PI*0.85,dist:285},{label:'Lido',angle:-Math.PI*0.25,dist:285}];
  entityData.forEach(e=>{
    nodes.push({id:nodes.length, x:CX+Math.cos(e.angle)*e.dist, y:CY+Math.sin(e.angle)*e.dist, vx:0,vy:0, r:14, label:e.label, color:'#A855F7', type:'entity', cluster:-1, isSquare:true});
  });
  const entIds = nodes.filter(n=>n.type==='entity').map(n=>n.id);
  const smKnown = nodes.filter(n=>n.type==='sm'||n.type==='known');
  entIds.forEach(eid=>{
    const count = 2+Math.floor(Math.random()*3); const used = new Set();
    for(let i=0;i<count;i++){const t=smKnown[Math.floor(Math.random()*smKnown.length)];if(!used.has(t.id)){used.add(t.id);edges.push({s:eid,t:t.id,type:'entity-link'});}}
    if(Math.random()<0.6) edges.push({s:eid,t:0,type:'entity-link'});
    if(Math.random()<0.4) edges.push({s:eid,t:1,type:'entity-link'});
  });
  for(let i=0;i<40;i++){
    const cl=Math.random()<0.6?1:0;
    const hubX=cl===1?hub1X:hub2X, hubY=cl===1?hub1Y:hub2Y;
    const angle=Math.random()*Math.PI*2, dist=240+Math.random()*80;
    nodes.push({id:nodes.length, x:hubX+Math.cos(angle)*dist, y:hubY+Math.sin(angle)*dist, vx:0,vy:0, r:1.5+Math.random()*1.5, label:rAddr(), color:'#374151', type:'peripheral', cluster:cl});
    const pool=nodes.filter(n=>n.type==='known'||n.type==='sm');
    const p=pool[Math.floor(Math.random()*pool.length)];
    edges.push({s:p.id,t:nodes.length-1,type:'peripheral'});
  }
  edges.push({s:0,t:1,type:'hub-sm'});
  nodes.forEach(n=>n.conn=0);
  edges.forEach(e=>{nodes[e.s].conn++;nodes[e.t].conn++;});

  let iteration=0, settled=false;
  function simulate(){
    for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){let dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y;let d2=dx*dx+dy*dy;if(d2<1)d2=1;let d=Math.sqrt(d2),f=200/d2;let fx=dx/d*f,fy=dy/d*f;if(!nodes[i]._pinned){nodes[i].vx-=fx;nodes[i].vy-=fy;}if(!nodes[j]._pinned){nodes[j].vx+=fx;nodes[j].vy+=fy;}}}
    edges.forEach(e=>{const a=nodes[e.s],b=nodes[e.t];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;let rest=e.type==='peripheral'?60:e.type==='hub-sm'?smR:e.type==='hub-known'?knownR1*0.9:100;let f=0.015*(d-rest),fx=dx/d*f,fy=dy/d*f;if(!a._pinned){a.vx+=fx;a.vy+=fy;}if(!b._pinned){b.vx-=fx;b.vy-=fy;}});
    nodes.forEach(n=>{if(n.type==='hub')return;const hx=n.cluster===1?hub1X:n.cluster===0?hub2X:CX;const hy=n.cluster===1?hub1Y:n.cluster===0?hub2Y:CY;const grav=n.type==='entity'?0.003:0.008;n.vx+=(hx-n.x)*grav;n.vy+=(hy-n.y)*grav;});
    nodes.forEach(n=>{if(n.type==='hub')return;n.vx+=(CX-n.x)*0.002;n.vy+=(CY-n.y)*0.002;});
    nodes.forEach(n=>{if(n.type==='hub'){n.vx=0;n.vy=0;return;}n.vx*=0.92;n.vy*=0.92;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+8,Math.min(W-n.r-8,n.x));n.y=Math.max(n.r+8,Math.min(H-n.r-8,n.y));});
    iteration++;
  }

  let settledPos=[];
  function draw(time){
    ctx.clearRect(0,0,W,H);
    const t=time||0;
    if(settled&&settledPos.length){nodes.forEach((n,i)=>{const sp=settledPos[i];n.x=sp.ox+Math.sin(t*0.0008*sp.sx+sp.px)*sp.ax;n.y=sp.oy+Math.cos(t*0.0006*sp.sy+sp.py)*sp.ay;});}
    ctx.save();
    ctx.translate(panX+W/2*(1-zoom),panY+H/2*(1-zoom));
    ctx.scale(zoom,zoom);
    // Cluster zones
    ctx.beginPath();ctx.arc(hub1X,hub1Y,220,0,Math.PI*2);ctx.fillStyle='rgba(0,229,160,0.025)';ctx.fill();ctx.strokeStyle='rgba(0,229,160,0.07)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(hub2X,hub2Y,210,0,Math.PI*2);ctx.fillStyle='rgba(245,166,35,0.02)';ctx.fill();ctx.strokeStyle='rgba(245,166,35,0.06)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.font='bold 10px JetBrains Mono,monospace';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,229,160,0.35)';ctx.fillText('Cluster #1 — DeFi Whale',hub1X,hub1Y-230);
    ctx.fillStyle='rgba(245,166,35,0.35)';ctx.fillText('Cluster #0 — Fund Deployer',hub2X,hub2Y-220);
    const highlightNode=dragNode||null;
    edges.forEach(e=>{const a=nodes[e.s],b=nodes[e.t];const hl=highlightNode&&(e.s===highlightNode.id||e.t===highlightNode.id);ctx.beginPath();
      if(e.type==='hub-sm'){ctx.strokeStyle=hl?'rgba(0,229,160,0.95)':'rgba(0,229,160,0.5)';ctx.lineWidth=hl?2.5:1.5;const mx=(a.x+b.x)/2+(a.y-b.y)*0.12,my=(a.y+b.y)/2+(b.x-a.x)*0.12;ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx,my,b.x,b.y);}
      else if(e.type==='hub-known'){ctx.strokeStyle=hl?'rgba(245,158,11,0.7)':'rgba(245,158,11,0.18)';ctx.lineWidth=hl?1.8:0.7;const mx=(a.x+b.x)/2+(a.y-b.y)*0.06,my=(a.y+b.y)/2+(b.x-a.x)*0.06;ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx,my,b.x,b.y);}
      else if(e.type==='entity-link'){ctx.strokeStyle=hl?'rgba(168,85,247,0.7)':'rgba(168,85,247,0.15)';ctx.lineWidth=hl?1.5:0.6;ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);}
      else{ctx.strokeStyle=hl?'rgba(156,163,175,0.5)':'rgba(31,41,55,0.25)';ctx.lineWidth=hl?0.8:0.3;ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);}
      ctx.stroke();});
    nodes.forEach(n=>{
      if(n.type==='hub'){ctx.beginPath();const pulse=1+0.12*Math.sin(t*0.003+(n.cluster===1?0:Math.PI));const grad=ctx.createRadialGradient(n.x,n.y,n.r*0.3,n.x,n.y,n.r*3*pulse);grad.addColorStop(0,n.color+'40');grad.addColorStop(1,n.color+'00');ctx.fillStyle=grad;ctx.arc(n.x,n.y,n.r*3*pulse,0,Math.PI*2);ctx.fill();}
      if(n.type==='sm'){ctx.beginPath();const grad=ctx.createRadialGradient(n.x,n.y,n.r*0.3,n.x,n.y,n.r*2);grad.addColorStop(0,'#00E5A020');grad.addColorStop(1,'#00E5A000');ctx.fillStyle=grad;ctx.arc(n.x,n.y,n.r*2,0,Math.PI*2);ctx.fill();}
      if(n.isSquare){const s=n.r*1.4;ctx.fillStyle='#A855F7';ctx.beginPath();ctx.roundRect(n.x-s,n.y-s,s*2,s*2,4);ctx.fill();ctx.strokeStyle='rgba(168,85,247,0.5)';ctx.lineWidth=1.5;ctx.stroke();}
      else{ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);if(n.type==='hub'){ctx.fillStyle=n.color;ctx.strokeStyle=n.color+'80';ctx.lineWidth=2;ctx.fill();ctx.stroke();}else if(n.type==='sm'){ctx.fillStyle='#00E5A0';ctx.fill();}else if(n.type==='known'){ctx.fillStyle='#4B5563';ctx.fill();}else{ctx.fillStyle='#2A3040';ctx.globalAlpha=0.6;ctx.fill();ctx.globalAlpha=1;}}
    });
    ctx.textAlign='center';
    nodes.forEach(n=>{if(n.type==='hub'){ctx.fillStyle='#E5E7EB';ctx.font='bold 11px JetBrains Mono,monospace';ctx.fillText(n.label,n.x,n.y+n.r+18);}else if(n.type==='sm'){ctx.fillStyle='#00E5A0';ctx.font='bold 9px JetBrains Mono,monospace';ctx.fillText(n.label,n.x,n.y+n.r+13);}else if(n.type==='entity'){ctx.fillStyle='#E9D5FF';ctx.font='bold 10px JetBrains Mono,monospace';ctx.fillText(n.label,n.x,n.y+n.r+16);}});
    ctx.restore();
  }

  let zoom=1,panX=0,panY=0,dragging=false,dragStartX=0,dragStartY=0,dragPanX=0,dragPanY=0;
  window.netZoom=function(f){zoom*=f;zoom=Math.max(0.3,Math.min(5,zoom));draw();};
  window.netReset=function(){zoom=1;panX=0;panY=0;draw();};
  let dragNode=null;
  function screenToWorld(sx,sy){return{x:(sx-panX-W/2*(1-zoom))/zoom,y:(sy-panY-H/2*(1-zoom))/zoom};}
  function findNodeAt(sx,sy){const p=screenToWorld(sx,sy);for(let i=nodes.length-1;i>=0;i--){const n=nodes[i],dx=p.x-n.x,dy=p.y-n.y;if(dx*dx+dy*dy<Math.max(n.r*n.r*4,100))return n;}return null;}
  container.addEventListener('wheel',function(ev){ev.preventDefault();const f=ev.deltaY>0?0.9:1.1;zoom*=f;zoom=Math.max(0.3,Math.min(5,zoom));draw();},{passive:false});
  container.addEventListener('mousedown',function(ev){const rect=canvas.getBoundingClientRect();const sx=ev.clientX-rect.left,sy=ev.clientY-rect.top;const hit=findNodeAt(sx,sy);if(hit){dragNode=hit;dragNode._pinned=true;container.style.cursor='grabbing';}else{dragging=true;dragStartX=ev.clientX;dragStartY=ev.clientY;dragPanX=panX;dragPanY=panY;container.style.cursor='grabbing';}});
  window.addEventListener('mousemove',function(ev){if(dragNode){const rect=canvas.getBoundingClientRect();const p=screenToWorld(ev.clientX-rect.left,ev.clientY-rect.top);dragNode.x=p.x;dragNode.y=p.y;dragNode.vx=0;dragNode.vy=0;if(settled&&settledPos[dragNode.id]){settledPos[dragNode.id].ox=p.x;settledPos[dragNode.id].oy=p.y;}draw();}else if(dragging){panX=dragPanX+(ev.clientX-dragStartX);panY=dragPanY+(ev.clientY-dragStartY);draw();}});
  window.addEventListener('mouseup',function(){if(dragNode){dragNode._pinned=false;dragNode=null;}if(dragging)dragging=false;container.style.cursor='grab';});
  canvas.addEventListener('mousemove',function(ev){const rect=canvas.getBoundingClientRect();const mx=(ev.clientX-rect.left-panX-W/2*(1-zoom))/zoom,my=(ev.clientY-rect.top-panY-H/2*(1-zoom))/zoom;let found=null;for(let i=nodes.length-1;i>=0;i--){const n=nodes[i],dx=mx-n.x,dy=my-n.y;if(dx*dx+dy*dy<Math.max(n.r*n.r*4,64)){found=n;break;}}
    if(found){const n=found;const lbl=n.type==='hub'?'Cluster Hub':n.type==='sm'?'Tracked Wallet':n.type==='known'?'Related Wallet':n.type==='entity'?'Exchange / DEX':'Peripheral';const det=n.detail?'<br><span style="color:#8895A7;font-size:10px">'+n.detail+'</span>':'';tt.innerHTML='<span style="color:'+n.color+'">'+n.label+'</span><br>'+lbl+' · '+n.conn+' connections'+det;const sX=n.x*zoom+panX+W/2*(1-zoom),sY=n.y*zoom+panY+H/2*(1-zoom);tt.style.display='block';tt.style.left=Math.min(sX+15,W-200)+'px';tt.style.top=Math.max(sY-55,4)+'px';canvas.style.cursor='pointer';}else{tt.style.display='none';canvas.style.cursor=dragging?'grabbing':'grab';}});
  canvas.addEventListener('mouseleave',function(){tt.style.display='none';});

  function loop(time){if(!settled){for(let s=0;s<2;s++)simulate();if(iteration>=100){settled=true;settledPos=nodes.map(n=>({ox:n.x,oy:n.y,px:Math.random()*6.28,py:Math.random()*6.28,sx:0.3+Math.random()*0.5,sy:0.25+Math.random()*0.4,ax:0.3+Math.random()*0.5,ay:0.3+Math.random()*0.5}));}}draw(time);requestAnimationFrame(loop);}
  resize(); initialized=true; loop(0);
  window.addEventListener('resize',resize);
})();
</script>
</body>
</html>
